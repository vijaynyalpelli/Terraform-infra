name: Terraform Plan (CI - No Deploy)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TERRAFORM_VERSION: 1.0

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    name: Terraform Validate & Plan

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      # ===== AZURE AUTHENTICATION DISABLED FOR SAFETY =====
      # terraform plan requires authentication to Azure to query current state.
      # Currently DISABLED to prevent accidental API calls that could:
      # - Incur Azure costs during CI runs
      # - Modify or expose unintended resources
      # - Expose credentials in CI logs
      #
      # To enable: Uncomment azure/login step below and configure GitHub secrets:
      # Required Secrets:
      #   - AZURE_CLIENT_ID (service principal client ID)
      #   - AZURE_TENANT_ID (Azure AD tenant ID)
      #   - AZURE_SUBSCRIPTION_ID (subscription ID)
      #
      # Recommended: Use OIDC token-based federation instead of storing secrets.
      #
      # For now, CI only validates Terraform syntax and formatting.
      # Full plan validation (with Azure auth) happens in the manual
      # deployment workflow which requires explicit approval.

      # UNCOMMENT WHEN READY (requires GitHub secrets + OIDC/service principal setup):
      # - name: Azure Login (OIDC)
      #   uses: azure/login@v3
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -json

      - name: Terraform Plan (No Apply)
        id: plan
        run: |
          # ===== AZURE AUTHENTICATION REQUIRED =====
          # This step requires Azure login (currently disabled for safety).
          # Without Azure auth, terraform plan will fail with:
          # "ERROR: Please run 'az login' to setup account"
          #
          # Since auth is disabled above, this will attempt to run but may fail.
          # This is intentional to prevent accidental Azure API calls.
          #
          # For full CI validation with Azure, enable the azure/login step above.
          terraform plan -no-color -out=tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const plan = `${{ steps.plan.outputs.stdout }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      # ===== DEPLOYMENT SECTIONS COMMENTED OUT =====
      # Uncomment only when manually triggered and approved by ops team

      # - name: Terraform Apply
      #   id: apply
      #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      #   run: terraform apply -auto-approve tfplan
      #   env:
      #     TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #     TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}

      # - name: Post Apply Output
      #   if: steps.apply.outcome == 'success'
      #   run: |
      #     terraform output > apply-output.txt
      #     echo "Deployment completed successfully"
      #     cat apply-output.txt

      # - name: Upload Apply Output
      #   if: steps.apply.outcome == 'success'
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: terraform-apply-output
      #     path: apply-output.txt

      - name: Job Summary
        run: |
          echo "## ? Terraform CI Validation Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Code checked, no deployment performed" >> $GITHUB_STEP_SUMMARY
          echo "**Format Check:** ${{ steps.fmt.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Validation:** ${{ steps.validate.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Plan:** ${{ steps.plan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "?? **To deploy:** Uncomment apply steps and trigger manually" >> $GITHUB_STEP_SUMMARY
